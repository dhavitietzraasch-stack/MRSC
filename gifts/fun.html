<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muito Obrigado!</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        .card {
            background: #ffffff;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 450px;
            width: 90%;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        h1 {
            color: #2c3e50;
            font-size: 28px;
            margin-bottom: 10px;
            min-height: 42px;
        }

        p.subtitle {
            color: #7f8c8d;
            font-size: 16px;
            margin-bottom: 25px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #34495e;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e6ed;
            border-radius: 12px;
            font-size: 16px;
            font-family: 'Poppins', sans-serif;
            transition: border-color 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: #32BCAD;
        }

/* Animação que muda a cor e pulsa levemente */
@keyframes attention-vibe {
    0% { background-color: #32BCAD; transform: scale(1); }
    25% { background-color: #e67e22; transform: scale(1.03); }
    50% { background-color: #9b59b6; transform: scale(1); }
    75% { background-color: #e74c3c; transform: scale(1.03); }
    100% { background-color: #32BCAD; transform: scale(1); }
}

.btn-principal {
    /* Cor base e estilo */
    background-color: #32BCAD;
    color: white;
    border: none;
    padding: 18px 24px;
    border-radius: 12px;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    
    /* Aplicação da animação infinita */
    animation: attention-vibe 3s infinite ease-in-out;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    transition: filter 0.3s ease;
}

.btn-principal:hover {
    animation-play-state: paused; /* Pausa ao passar o mouse para facilitar o clique */
    filter: brightness(1.2);
}

        .btn-principal:hover {
            box-shadow: 0 8px 20px rgba(50, 188, 173, 0.4);
            transform: translateY(-2px);
        }

        /* Container do PIX oculto por padrão */
        #pix-container {
            display: none;
            margin-top: 25px;
            padding: 20px;
            background: #f0fdfa;
            border: 2px dashed #32BCAD;
            border-radius: 16px;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chave-pix {
            font-size: 15px;
            font-weight: 700;
            color: #2c3e50;
            word-break: break-all;
            margin: 15px 0;
            padding: 10px;
            background: #e6f7f5;
            border-radius: 8px;
        }

        .btn-copiar {
            background: #2c3e50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.3s;
            font-family: 'Poppins', sans-serif;
        }

        .btn-copiar:hover {
            background: #1a252f;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1 id="titulo-agradecimento">Muito Obrigado!</h1>
        <p class="subtitle">Sua contribuição faz toda a diferença.</p>

        <div class="input-group">
            <label for="nome">meu nome é Dhavi e Como podemos te chamar?</label>
            <input type="text" id="nome" placeholder="Digite seu nome aqui...">
        </div>

        <button class="btn-principal" onclick="mostrarPix()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            ♥︎》Apoiar com PIX
        </button>

        <div id="pix-container">
            <p>Utilize a chave abaixo para fazer a transferência com seu consentimento ☕️:</p>
            
            <div class="chave-pix" id="texto-chave">042.789.652-57</div>
            
            <button class="btn-copiar" onclick="copiarPix()">Copiar Chave ☕️</button>
        </div>
    </div>

    <script>
        // Atualiza o título em tempo real
        const inputNome = document.getElementById('nome');
        const titulo = document.getElementById('titulo-agradecimento');

        inputNome.addEventListener('input', function(e) {
            const nomeDigitado = e.target.value.trim();
            if (nomeDigitado) {
                titulo.innerText = `Muito Obrigado, ${nomeDigitado}!`;
            } else {
                titulo.innerText = 'Muito Obrigado!';
            }
        });

        // Mostra a área do PIX
        function mostrarPix() {
            document.getElementById('pix-container').style.display = 'block';
        }

        // Função para copiar a chave PIX
        function copiarPix() {
            const chave = document.getElementById('texto-chave').innerText;
            navigator.clipboard.writeText(chave).then(() => {
                const btnCopiar = document.querySelector('.btn-copiar');
                const textoOriginal = btnCopiar.innerText;
                
                btnCopiar.innerText = 'Copiado! ✓';
                btnCopiar.style.background = '#27ae60';
                
                // Volta ao estado original após 2 segundos
                setTimeout(() => {
                    btnCopiar.innerText = textoOriginal;
                    btnCopiar.style.background = '#2c3e50';
                }, 2000);
            }).catch(err => {
                alert('Erro ao copiar a chave. Por favor, selecione e copie manualmente.');
            });
        }
    </script>
</body>
</html>
